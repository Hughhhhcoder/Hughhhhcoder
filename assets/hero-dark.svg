<svg width="1024" height="300" viewBox="0 0 1024 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Profile hero">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#020617"/>
    <stop offset="60%" stop-color="#081226"/>
    <stop offset="100%" stop-color="#062c30"/>
  </linearGradient>
  <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="transparent"/>
    <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="transparent"/>
  </linearGradient>
  <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="8" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>
<rect x="0.5" y="0.5" width="1023" height="299" rx="24" fill="url(#bg)" stroke="#1f2a44"/>
<circle cx="168" cy="76" r="84" fill="#38bdf8" opacity="0.12" filter="url(#glow)">
  <animate attributeName="cx" values="150;180;150" dur="12s" repeatCount="indefinite"/>
</circle>
<circle cx="884" cy="228" r="96" fill="#14b8a6" opacity="0.11" filter="url(#glow)">
  <animate attributeName="cy" values="220;240;220" dur="10s" repeatCount="indefinite"/>
</circle>
<rect x="-1024" y="0" width="1024" height="300" fill="url(#shine)">
  <animate attributeName="x" values="-1024;1024" dur="9.5s" repeatCount="indefinite"/>
</rect>
<text x="54" y="92" fill="#e2e8f0" font-size="50" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" font-weight="700">HughChaw</text>
<text x="56" y="130" fill="#94a3b8" font-size="20" font-family="JetBrains Mono, ui-monospace, Menlo, monospace">Design x Engineering x AI Product</text>
<text x="56" y="166" fill="#e2e8f0" font-size="16" font-family="JetBrains Mono, ui-monospace, Menlo, monospace">Design-minded developer building practical AI products.</text>
<text x="56" y="196" fill="#94a3b8" font-size="14" font-family="JetBrains Mono, ui-monospace, Menlo, monospace">Slow is smooth, smooth is fast. 慢慢走，比较快。</text>
<g>
  <rect x="56" y="220" width="130" height="34" rx="9" fill="#0f172a" stroke="#1f2a44"/>
  <text x="74" y="242" fill="#22d3ee" font-size="14" font-family="JetBrains Mono, ui-monospace, Menlo, monospace">Followers</text>
  <text x="170" y="242" text-anchor="end" fill="#e2e8f0" font-size="16" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" font-weight="700">2</text>
</g>
<g>
  <rect x="198" y="220" width="130" height="34" rx="9" fill="#0f172a" stroke="#1f2a44"/>
  <text x="216" y="242" fill="#22d3ee" font-size="14" font-family="JetBrains Mono, ui-monospace, Menlo, monospace">Repos</text>
  <text x="312" y="242" text-anchor="end" fill="#e2e8f0" font-size="16" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" font-weight="700">13</text>
</g>
<g>
  <rect x="340" y="220" width="170" height="34" rx="9" fill="#0f172a" stroke="#1f2a44"/>
  <text x="358" y="242" fill="#22d3ee" font-size="14" font-family="JetBrains Mono, ui-monospace, Menlo, monospace">Updated</text>
  <text x="496" y="242" text-anchor="end" fill="#e2e8f0" font-size="14" font-family="JetBrains Mono, ui-monospace, Menlo, monospace" font-weight="700">2026-03-30</text>
