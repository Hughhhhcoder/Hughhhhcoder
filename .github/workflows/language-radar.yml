name: Update Profile UI (Legacy)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate profile SVG assets
        env:
          PROFILE_STATS_PAT: ${{ secrets.PROFILE_STATS_PAT }}
          FALLBACK_GITHUB_TOKEN: ${{ github.token }}
        run: |
          export GH_TOKEN="${PROFILE_STATS_PAT:-$FALLBACK_GITHUB_TOKEN}"
          python scripts/generate_profile_ui.py \
            --username Hughhhhcoder \
            --output-dir assets \
            --include-forks \
            --include-private

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A assets
          git commit -m "chore: refresh profile ui assets"
          git push
