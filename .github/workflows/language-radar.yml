name: Update Language Radar

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate language radar SVG
        env:
          GH_TOKEN: ${{ secrets.PROFILE_STATS_PAT || secrets.GITHUB_TOKEN }}
        run: |
          python scripts/generate_language_radar.py \
            --username Hughhhhcoder \
            --output assets/language-radar-dark.svg \
            --include-forks \
            --include-private \
            --theme dark

          python scripts/generate_language_radar.py \
            --username Hughhhhcoder \
            --output assets/language-radar-light.svg \
            --include-forks \
            --include-private \
            --theme light

          python scripts/generate_motion_strip.py \
            --output assets/motion-strip-dark.svg \
            --theme dark

          python scripts/generate_motion_strip.py \
            --output assets/motion-strip-light.svg \
            --theme light

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A assets
          git commit -m "chore: update language radar"
          git push
