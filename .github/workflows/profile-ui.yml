name: Update Profile UI

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate profile SVG assets
        env:
          GH_TOKEN: ${{ secrets.PROFILE_STATS_PAT || secrets.GITHUB_TOKEN }}
        run: |
          python scripts/generate_profile_ui.py \
            --username Hughhhhcoder \
            --output-dir assets \
            --include-forks \
            --include-private

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A assets
          git commit -m "chore: refresh profile ui assets"
          git push
